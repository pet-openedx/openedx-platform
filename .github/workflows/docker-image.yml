name: Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag
        required: false
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pet-openedx/openedx-platform:${{ github.event.inputs.tag }}
            ghcr.io/pet-openedx/openedx-platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
